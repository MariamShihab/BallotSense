name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  api:
    name: API checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install API dependencies
        run: python -m pip install -e '.[dev]'
      - name: Lint API
        run: python -m ruff check ballotsense_api tests
      - name: Test API
        run: python -m pytest

  web:
    name: Web checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web dependencies
        run: npm ci
      - name: Check web
        run: npm run check
