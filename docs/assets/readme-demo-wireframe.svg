<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">BallotSense archive demo wireframe</title>
  <desc id="desc">A stylized wireframe of the BallotSense archive demo showing selected issue lenses, cited research, source proof, correction workflow, and insufficient evidence abstention.</desc>
  <rect width="1200" height="720" rx="34" fill="#F7F3EB"/>
  <path d="M739 0H1200V720H291L739 0Z" fill="#DCEBE1"/>
  <rect x="56" y="52" width="1088" height="616" rx="28" fill="white" fill-opacity="0.72" stroke="#D9D0C1"/>

  <g transform="translate(96 88)">
    <rect width="206" height="30" rx="15" fill="#E7F3EA"/>
    <text x="18" y="20" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#405349" letter-spacing="2">ARCHIVE DEMO</text>
    <rect x="220" width="176" height="30" rx="15" fill="#FFF6DF"/>
    <text x="238" y="20" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#6C5628" letter-spacing="1.5">MEASURE D ONLY</text>

    <text x="0" y="92" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="700" fill="#191815">Shows its work</text>
    <text x="0" y="154" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="700" fill="#191815">before it speaks.</text>
    <text x="2" y="202" font-family="Inter, Arial, sans-serif" font-size="19" fill="#4C4740">Cited research assistance. No rankings. No match scores.</text>
  </g>

  <g transform="translate(96 342)">
    <rect width="478" height="244" rx="18" fill="#FFFBF2" stroke="#D1C7B7"/>
    <text x="28" y="48" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800" fill="#191815">1. Choose a contest</text>
    <rect x="28" y="76" width="422" height="66" rx="12" fill="#EDF5EF" stroke="#386859"/>
    <circle cx="58" cy="109" r="10" fill="#386859"/>
    <text x="84" y="105" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#191815">Measure D</text>
    <text x="84" y="128" font-family="Inter, Arial, sans-serif" font-size="14" fill="#665F54">Santa Clara Valley Open Space Authority</text>
    <rect x="28" y="158" width="422" height="54" rx="12" fill="white" stroke="#DDD2C1"/>
    <circle cx="58" cy="185" r="10" stroke="#9C8F7C" stroke-width="2"/>
    <text x="84" y="190" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#6B655C">District 1 — not covered yet</text>
  </g>

  <g transform="translate(626 260)">
    <rect width="422" height="326" rx="18" fill="#F8FFF9" stroke="#C3D1C8"/>
    <text x="28" y="48" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800" fill="#191815">2. Pick issue lenses</text>
    <rect x="28" y="76" width="366" height="58" rx="12" fill="white" stroke="#D2DFD6"/>
    <rect x="48" y="96" width="18" height="18" rx="4" fill="white" stroke="#9AAEA4" stroke-width="2"/>
    <text x="82" y="112" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#25231F">Housing affordability</text>

    <rect x="28" y="148" width="366" height="58" rx="12" fill="#E7F3EA" stroke="#386859"/>
    <rect x="48" y="168" width="18" height="18" rx="4" fill="#386859"/>
    <path d="M52 177L58 183L67 171" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="82" y="184" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#25231F">Climate/environment</text>

    <rect x="28" y="220" width="366" height="58" rx="12" fill="#E7F3EA" stroke="#386859"/>
    <rect x="48" y="240" width="18" height="18" rx="4" fill="#386859"/>
    <path d="M52 249L58 255L67 243" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="82" y="256" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#25231F">Public education</text>
  </g>

  <g transform="translate(96 612)">
    <rect width="952" height="2" fill="#DDD2C1"/>
  </g>

  <g transform="translate(96 610)">
    <rect x="0" y="-252" width="952" height="226" rx="18" fill="white" stroke="#C3D1C8"/>
    <text x="28" y="-204" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" fill="#52685C" letter-spacing="5">MEASURE D RESEARCH BRIEF</text>
    <text x="28" y="-166" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#191815">3. Inspect cited evidence</text>

    <rect x="28" y="-132" width="424" height="82" rx="14" fill="#FFFFFF" stroke="#D2DFD6"/>
    <text x="48" y="-99" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#191815">Climate/environment</text>
    <rect x="304" y="-116" width="118" height="28" rx="14" fill="#EDF5EF"/>
    <text x="321" y="-97" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" fill="#405349">cited evidence</text>
    <text x="48" y="-70" font-family="Inter, Arial, sans-serif" font-size="15" fill="#4C4740">Claim is backed by reviewed source proof.</text>

    <rect x="486" y="-132" width="438" height="82" rx="14" fill="#FFFAF0" stroke="#EADCC8"/>
    <text x="506" y="-99" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#191815">Public education</text>
    <rect x="723" y="-116" width="176" height="28" rx="14" fill="#F5EAD4"/>
    <text x="741" y="-97" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" fill="#6C5628">insufficient evidence</text>
    <text x="506" y="-70" font-family="Inter, Arial, sans-serif" font-size="15" fill="#665F54">BallotSense abstains instead of guessing.</text>

    <rect x="28" y="-36" width="278" height="42" rx="10" fill="#F7F3EB" stroke="#E1D7C9"/>
    <text x="48" y="-10" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" fill="#245C4D">▶ Inspect source proof</text>
    <rect x="326" y="-36" width="248" height="42" rx="10" fill="#F8FFF9" stroke="#D2DFD6"/>
    <text x="346" y="-10" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" fill="#245C4D">Report source issue</text>
  </g>
</svg>
